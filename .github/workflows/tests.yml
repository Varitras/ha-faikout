name: Tests

on:
  push:
    branches: [master]
  pull_request:

jobs:
  pytest:
    name: pytest (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        # Current Home Assistant requires Python 3.14.
        python-version: ["3.14"]
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          # pytest-homeassistant-custom-component pulls in a matching
          # homeassistant and provides the `hass` fixture the integration tests
          # need; paho-mqtt is needed for the own-MQTT transport test.
          pip install pytest-homeassistant-custom-component paho-mqtt
      - name: Run tests
        run: python -m pytest -q

  hassfest:
    name: hassfest (manifest validation)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: home-assistant/actions/hassfest@master

  hacs:
    name: HACS validation (advisory)
    runs-on: ubuntu-latest
    # Advisory: full HACS default-store validation needs the Home Assistant
    # brands repo entry (external PR) and published releases, which are out of
    # scope for a personal custom repository. hassfest is the hard gate.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v7
      - uses: hacs/action@main
        with:
          category: integration
          ignore: brands
