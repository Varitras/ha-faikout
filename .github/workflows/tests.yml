name: Tests

on:
  push:
    branches: [master]
  pull_request:

# Nothing here writes to the repository.
permissions:
  contents: read

jobs:
  pytest:
    name: pytest (${{ matrix.label }})
    runs-on: ubuntu-latest
    strategy:
      # Both rows should always report; one failing must not hide the other.
      fail-fast: false
      matrix:
        include:
          # Catches deprecations and API breakage early.
          - label: current HA
            python-version: "3.14"
            phcc: ""
            coverage: "--cov=custom_components/faikout --cov-fail-under=90"
          # Guards the minimum version claimed in hacs.json and the README.
          # Each pytest-homeassistant-custom-component release pins exactly one
          # Home Assistant version, so the minimum is selected by pinning phcc:
          # 0.13.221 pins homeassistant 2025.3.0, the first release shipping
          # paho-mqtt 2.x, which the own MQTT client requires. That HA needs
          # Python 3.13, hence the paired Python version.
          - label: minimum HA 2025.3
            python-version: "3.13"
            phcc: "==0.13.221"
            coverage: ""
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          # pytest-homeassistant-custom-component pulls in a matching
          # homeassistant and provides the `hass` fixture the integration tests
          # need; paho-mqtt is needed for the own-MQTT transport test.
          pip install "pytest-homeassistant-custom-component${{ matrix.phcc }}" paho-mqtt
          pip install pytest-cov
      - name: Show versions under test
        run: pip show homeassistant pytest-homeassistant-custom-component | grep -E "^(Name|Version)"
      - name: Run tests
        # The floor sits below the current figure on purpose: it is there to
        # catch untested new code, not to make every refactor a coverage debate.
        run: python -m pytest -q ${{ matrix.coverage }}

  lint:
    name: lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"
      - run: pip install ruff
      # Only the linter, deliberately not `ruff format --check`: adopting the
      # formatter would reflow nearly every file at once, which buries real
      # changes in churn without making anything clearer.
      - run: ruff check .

  hassfest:
    name: hassfest (manifest validation)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: home-assistant/actions/hassfest@master

  hacs:
    name: HACS validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: hacs/action@main
        with:
          category: integration
