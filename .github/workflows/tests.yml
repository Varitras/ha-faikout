name: Tests

on:
  push:
    branches: [master]
  pull_request:

jobs:
  pytest:
    name: pytest (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          # homeassistant enables tests/test_imports.py (skipped without it)
          pip install pytest homeassistant
      - name: Run tests
        run: python -m pytest -q

  hassfest:
    name: hassfest (manifest validation)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: home-assistant/actions/hassfest@master

  hacs:
    name: HACS validation (advisory)
    runs-on: ubuntu-latest
    # Advisory: full HACS default-store validation needs the Home Assistant
    # brands repo entry (external PR) and published releases, which are out of
    # scope for a personal custom repository. hassfest is the hard gate.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: hacs/action@main
        with:
          category: integration
          ignore: brands
